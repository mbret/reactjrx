name: CI
on:
  pull_request:
jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
      - name: Install dependencies
        run: npm ci
      - name: Lint / format
        run: npm run check
      - name: Test
        run: npm run test:ci
